<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* ===== ENCABEZADO ===== */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #ddd;
      background-color: #ffffff;
    }

    header img {
      height: 50px;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* ===== IFRAME ===== */
    iframe {
      border: none;
      width: 100%;
      height: calc(100% - 82px); /* resta la altura aproximada del header */
    }
    
/* ===== AJUSTES PARA MÓVIL ===== */
    @media (max-width: 768px) {

      header {
        padding: 0.5rem 1rem;
        gap: 0.75rem;
      }

      header img {
        height: 32px;
      }

      header h1 {
        font-size: 1.1rem;
      }

      iframe {
        height: calc(100% - 56px);
      }
    }

    /* ===== EXTRA PARA MÓVILES PEQUEÑOS ===== */
    @media (max-width: 480px) {

      header img {
        height: 28px;
      }

      header h1 {
        font-size: 1rem;
      }
    }

/*ORIZONTAL (MUY IMPORTANTE) ===== */
@media (max-height: 500px) and (orientation: landscape) {

  header {
    padding: 0.25rem 0.75rem;
    gap: 0.5rem;
  }

  header img {
    height: 24px;   /* logos muy pequeños */
  }

  header h1 {
    font-size: 0.9rem;
    line-height: 1.1;
  }

  iframe {
    height: calc(100% - 40px); /* header ultra bajo */
  }
}

/* ===== HEADER OC VISIBLE ===== */
header {
  position: relative;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* Header oculto */
header.hidden {
  transform: translateY(-100%);
  opacity: 0;
}

  </style>
</head>

<body>

  <header>
    <img src="assets/unex_logo.png" alt="Logo UNEX">
    <img src="assets/Imagen1.png" alt="Logo 1">
    <h1>SEGUIMIENTO Tª HR CO2 PILA CÁMARA</h1>
  </header>

  <iframe
    src="https://lookerstudio.google.com/embed/reporting/10b173b5-7012-4ae2-bd46-490e38921561/page/zhvuF"
    allowfullscreen>
  </iframe>
<script>
  let lastSelector("header");  let lastScrollY = window.scrollY;

  // 1️⃣ Ocultar automáticamente tras 3 segundos
  setTimeout(() => {
    header.classList.add("hidden");
  }, 3000);

  // 2️⃣ Mostrar al hacer scroll hacia arriba
  window.addEventListener("scroll", () => {
    const currentScrollY = window.scrollY;

    if (currentScrollY < lastScrollY) {
      // Scroll hacia arriba → mostrar header
      header.classList.remove("hidden");
    } else if (currentScrollY > lastScrollY + 10) {
      // Scroll hacia abajo → ocultar header
      header.classList.add("hidden");
    }

    lastScrollY = currentScrollY;
  });
</script>

</body>
</html>
