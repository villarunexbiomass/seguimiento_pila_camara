<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* ===== ENCABEZADO ===== */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #ddd;
      background-color: #ffffff;
    }

    header img {
      height: 50px;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* ===== IFRAME ===== */
    iframe {
      border: none;
      width: 100%;
      height: calc(100% - 82px); /* resta la altura aproximada del header */
    }
  </style>
</head>

<body>

  <header>
    <img src="assets/unex_logo.png" alt="Logo UNEX">
    <img src="assets/Imagen1.png" alt="Logo 1">
    <h1>SEGUIMIENTO PILA CÁMARA</h1>
  </header>

  <iframe
    src="https://lookerstudio.google.com/embed/reporting/10b173b5-7012-4ae2-bd46-490e38921561/page/zhvuF"
    allowfullscreen>
  </iframe>

</body>
</html>
